<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="Terminal demo for Yuque Publishing Skill">
  <rect width="920" height="420" rx="12" fill="#0d1117"/>
  <rect x="0" y="0" width="920" height="42" rx="12" fill="#161b22"/>
  <circle cx="22" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="21" r="6" fill="#28c840"/>
  <text x="86" y="27" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">yuque-publishing-skill demo</text>
  <text x="28" y="78" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">$ npx skills add https://github.com/azel-ko/yuque-publishing-skill</text>
  <text x="28" y="108" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Installed skill: yuque-publishing</text>
  <text x="28" y="148" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">$ export YUQUE_TOKEN="REDACTED"</text>
  <text x="28" y="188" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">$ python3 ~/.codex/skills/yuque-publishing/scripts/yuque_publish.py \</text>
  <text x="52" y="216" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">create-doc --namespace azel/zob9yu --title "Article Title" --file article.md</text>
  <text x="28" y="256" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">{</text>
  <text x="52" y="282" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">"dry_run": true,</text>
  <text x="52" y="308" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">"operation": "create-doc",</text>
  <text x="52" y="334" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">"auth": "YUQUE_TOKEN via X-Auth-Token",</text>
  <text x="52" y="360" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">"next_step": "inspect payload, then add --execute to publish"</text>
  <text x="28" y="386" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">}</text>
</svg>
